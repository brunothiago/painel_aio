# Publica o painel em docs/ na branch main (GitHub Pages — pasta /docs).
# Alternativa ao artifact deploy quando o Actions falhar.

name: Deploy painel AIO

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verificar CSV
        run: |
          LINHAS=$(($(wc -l < dashboard/public/aio_solicitacoes.csv) - 1))
          echo "Registros AIO: $LINHAS"
          test "$LINHAS" -gt 0

      - name: Build
        working-directory: dashboard
        run: |
          npm ci
          npm run build

      - name: Publicar em docs/
        run: |
          rm -rf docs
          cp -r dashboard/dist docs
          touch docs/.nojekyll

      - name: Commit docs/ (se mudou)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet && echo "docs/ sem alteração" && exit 0
          git commit -m "Deploy GitHub Pages [automático]"

      - name: Push
        run: git push
